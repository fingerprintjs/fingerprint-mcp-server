name: Publish to MCP Registry

# Run deliberately as the final step of a release, NOT on every merge.
# The library here auto-tags v0.1.X on every push to main, but the registry
# entry describes the deployed remote (https://mcp.fpjs.io/mcp), whose
# lifecycle is the wrapper/platform-stack deploy. So publishing is manual:
# dispatch this after a prod rollout is confirmed healthy. Pass `version`
# to set the registry version explicitly, or leave blank to use the latest tag.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.1.34). Defaults to the latest git tag."
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for OIDC auth against io.github.fingerprintjs/*
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve version
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          fi
          echo "Publishing version $VERSION"
          jq --arg v "$VERSION" '.version = $v' server.json > server.tmp && mv server.tmp server.json

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
